# Apache Ossie Semantic Model for TPC-DS Retail Subset
# Based on: https://github.com/apache/ossie/blob/main/examples/tpcds_semantic_model.yaml

version: "0.2.0.dev0"

semantic_model:
  - name: tpcds_retail_model
    description: >
      TPC-DS retail semantic model for sales and customer analytics.
      Contains store sales transactions joined to date, customer, item, and store dimensions.
    ai_context:
      instructions: >
        Use this semantic model for retail analytics queries.
        Key rules:
        - "Sales" or "revenue" always means SUM(ss_ext_sales_price), NOT SUM(ss_sales_price).
          ss_sales_price is the unit price; ss_ext_sales_price is the extended (total line) amount.
        - "Profit" means SUM(ss_net_profit).
        - Always join fact table store_sales to dimension tables using the surrogate key relationships defined below.
        - Date filtering uses the date_dim table joined via ss_sold_date_sk = d_date_sk.
        - "Last month" or "June" refers to d_month_name = 'June' (in this dataset).

    datasets:
      - name: store_sales
        source: public.store_sales
        primary_key: [ss_item_sk, ss_ticket_number]
        description: >
          Fact table containing all store sales transactions.
          Each row is a line item in a sales ticket.
        ai_context:
          synonyms:
            - "sales transactions"
            - "store purchases"
            - "retail sales"
            - "POS data"

        fields:
          - name: ss_sold_date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_sold_date_sk
            description: Foreign key to date dimension (date_dim.d_date_sk)
            dimension:
              is_time: false

          - name: ss_item_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_item_sk
            description: Foreign key to item dimension (item.i_item_sk)
            dimension:
              is_time: false

          - name: ss_customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_customer_sk
            description: Foreign key to customer dimension (customer.c_customer_sk)
            dimension:
              is_time: false

          - name: ss_store_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_store_sk
            description: Foreign key to store dimension (store.s_store_sk)
            dimension:
              is_time: false

          - name: ss_quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_quantity
            description: Quantity of items sold in this line item
            ai_context:
              synonyms:
                - "units sold"
                - "quantity"

          - name: ss_sales_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_sales_price
            description: >
              Unit sales price. This is the price per single item, NOT the total line amount.
              Do NOT use this for revenue calculations; use ss_ext_sales_price instead.
            ai_context:
              synonyms:
                - "unit price"
                - "price per item"

          - name: ss_ext_sales_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_ext_sales_price
            description: >
              Extended sales price = quantity * unit price.
              This is the correct column for revenue/sales calculations.
            ai_context:
              synonyms:
                - "total sales"
                - "revenue"
                - "line total"
                - "sales amount"

          - name: ss_net_profit
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_net_profit
            description: Net profit from the sale (revenue minus cost)
            ai_context:
              synonyms:
                - "profit"
                - "margin"
                - "earnings"

      - name: date_dim
        source: public.date_dim
        primary_key: [d_date_sk]
        description: Date dimension with calendar attributes for time-based analysis
        ai_context:
          synonyms:
            - "calendar"
            - "dates"
            - "time periods"

        fields:
          - name: d_date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_date_sk
            description: Surrogate key for date
            dimension:
              is_time: false

          - name: d_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_date
            description: Actual calendar date
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "date"
                - "calendar date"

          - name: d_year
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_year
            description: Calendar year
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "year"

          - name: d_quarter_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_quarter_name
            description: Quarter identifier (e.g., "2024Q2")
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "quarter"
                - "fiscal quarter"

          - name: d_month_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_month_name
            description: Month name (e.g., "June", "July")
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "month"

      - name: customer
        source: public.customer
        primary_key: [c_customer_sk]
        description: Customer dimension with demographic information
        ai_context:
          synonyms:
            - "customers"
            - "shoppers"
            - "buyers"

        fields:
          - name: c_customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_customer_sk
            description: Surrogate key for customer
            dimension:
              is_time: false

          - name: c_customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_customer_id
            description: Business identifier for customer
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "customer ID"
                - "customer number"

          - name: c_first_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_first_name
            description: Customer first name
            dimension:
              is_time: false

          - name: c_last_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_last_name
            description: Customer last name
            dimension:
              is_time: false

          - name: customer_full_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_first_name || ' ' || c_last_name
            description: Full customer name (computed)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "full name"
                - "customer name"

          - name: c_email_address
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_email_address
            description: Customer email address
            dimension:
              is_time: false

      - name: item
        source: public.item
        primary_key: [i_item_sk]
        description: Item/Product dimension with product attributes
        ai_context:
          synonyms:
            - "products"
            - "items"
            - "merchandise"
            - "SKU"

        fields:
          - name: i_item_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_item_sk
            description: Surrogate key for item
            dimension:
              is_time: false

          - name: i_item_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_item_id
            description: Business key for item
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "item ID"
                - "product ID"
                - "SKU"

          - name: i_item_desc
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_item_desc
            description: Item description / product name
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "product name"
                - "product description"
                - "item name"

          - name: i_brand
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_brand
            description: Brand name of the product
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "brand"
                - "manufacturer"

          - name: i_category
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_category
            description: Product category (e.g., Electronics, Grocery, Footwear)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "product category"
                - "department"
                - "category"

          - name: i_current_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: i_current_price
            description: Current list price of the item
            dimension:
              is_time: false

      - name: store
        source: public.store
        primary_key: [s_store_sk]
        description: Store dimension with location and operational attributes
        ai_context:
          synonyms:
            - "stores"
            - "retail locations"
            - "branches"

        fields:
          - name: s_store_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_store_sk
            description: Surrogate key for store
            dimension:
              is_time: false

          - name: s_store_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_store_id
            description: Business key for store
            dimension:
              is_time: false

          - name: s_store_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_store_name
            description: Store name
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "store name"
                - "location name"

          - name: s_city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_city
            description: City where the store is located
            dimension:
              is_time: false

          - name: s_state
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_state
            description: US state where the store is located (2-letter code)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "state"
                - "region"

          - name: s_number_employees
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: s_number_employees
            description: Number of employees at the store
            ai_context:
              synonyms:
                - "employee count"
                - "headcount"
                - "staff size"

    relationships:
      - name: store_sales_to_date
        from: store_sales
        to: date_dim
        from_columns: [ss_sold_date_sk]
        to_columns: [d_date_sk]

      - name: store_sales_to_customer
        from: store_sales
        to: customer
        from_columns: [ss_customer_sk]
        to_columns: [c_customer_sk]

      - name: store_sales_to_item
        from: store_sales
        to: item
        from_columns: [ss_item_sk]
        to_columns: [i_item_sk]

      - name: store_sales_to_store
        from: store_sales
        to: store
        from_columns: [ss_store_sk]
        to_columns: [s_store_sk]

    metrics:
      - name: total_sales
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(store_sales.ss_ext_sales_price)
        description: Total sales revenue (extended price, not unit price)
        ai_context:
          synonyms:
            - "total revenue"
            - "gross sales"
            - "sales amount"

      - name: total_profit
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(store_sales.ss_net_profit)
        description: Total net profit from store sales
        ai_context:
          synonyms:
            - "net profit"
            - "total earnings"
            - "margin"

      - name: average_order_value
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(store_sales.ss_ext_sales_price)
        description: Average extended sales price per line item
        ai_context:
          synonyms:
            - "AOV"
            - "average transaction"

      - name: customer_lifetime_value
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(store_sales.ss_ext_sales_price) / COUNT(DISTINCT store_sales.ss_customer_sk)
        description: Average total revenue per unique customer
        ai_context:
          synonyms:
            - "CLV"
            - "LTV"
            - "customer value"

      - name: store_productivity
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(store_sales.ss_ext_sales_price) / NULLIF(MAX(store.s_number_employees), 0)
        description: Sales revenue per employee (requires join to store)
        ai_context:
          synonyms:
            - "sales per employee"
            - "employee productivity"
            - "revenue per headcount"
